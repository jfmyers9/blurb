name: Frontend Tests

on:
  push:
    paths:
      - src/**
      - package.json
      - package-lock.json
      - vite.config.ts
      - tsconfig.json
      - tsconfig.node.json
      - index.html
      - .github/workflows/test-frontend.yml
  pull_request:
    paths:
      - src/**
      - package.json
      - package-lock.json
      - vite.config.ts
      - tsconfig.json
      - tsconfig.node.json
      - index.html
      - .github/workflows/test-frontend.yml
  workflow_call:

jobs:
  frontend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm test
